name: Frontend

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: TypeScript
        run: npm run typecheck

      - name: Vite build
        run: npm run build
