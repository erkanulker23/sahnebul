# 413 Request Entity Too Large — tanıtım videosu (MP4) yüklemeleri için
#
# Laravel Forge: Site → your site → Nginx Configuration
# `server { ... }` bloğunun içine (genelde `location /` üstüne) ekleyin:
#
#   client_max_body_size 100M;
#
# Kaydedip yeniden yükle. Uygulama doğrulaması: video en fazla ~100 MB (bkz. PromoGalleryImportActions).

# İsteğe bağlı: yalnızca PHP'ye giden isteklerde sınır (bazı kurulumlarda önerilir)
# location ~ \.php$ {
#     client_max_body_size 100M;
#     ...
# }
