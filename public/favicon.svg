<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Sahnebul">
    <!--
      Küçük boyutlarda (sekme, Google sonuçları) okunaklılık için:
      tek şekil, düz dolgu, kalın harf — ince çizgi / gradient yok.
    -->
    <rect width="100" height="100" rx="22" fill="#ea580c"/>
    <rect x="1" y="1" width="98" height="98" rx="21" fill="none" stroke="#000" stroke-opacity="0.1" stroke-width="1"/>
    <!-- paint-order: kontur altta, dolgu üstte — turuncu üzerinde S net ayrılır -->
    <text
        x="50"
        y="56"
        text-anchor="middle"
        font-family="Arial Black, Helvetica Neue, Arial, sans-serif"
        font-size="58"
        font-weight="900"
        fill="#ffffff"
        stroke="#7c2d12"
        stroke-width="5"
        paint-order="stroke fill"
    >S</text>
</svg>
